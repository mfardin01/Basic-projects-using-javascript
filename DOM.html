<html>
    <body>
        <p id="para1">

        </p>
        <p class="para2">

        </p>
        <p class="para2">

        </p>
        <script>
            document.getElementById("para1").innerHTML = "This text is written by JavaScript using ID";
            document.getElementsByClassName("para2")[0].innerHTML = "This text is written by JavaScript using ClassName";
            document.getElementsByTagName("p")[2].innerHTML = "This text is written by JavaScript using TagName";
        </script>
    </body>
</html>
