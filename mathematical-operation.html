<html>
    <body>
        Enter first number: <input type="text" id="num1"> <br>
        Enter second number: <input type="text" id="num2"> <br>
        <button onclick="sum()">Addition</button>
        <button onclick="diff()">Substraction</button>
        <button onclick="mul()">Multiplication</button>
        <button onclick="div()">Division</button>
        <h2 id="result">

        </h2>
        <script>
            function sum(){
                nmbr1 = parseInt(document.getElementById("num1").value);
                nmbr2 = parseInt(document.getElementById("num2").value);
                document.getElementById("result").innerHTML = nmbr1+nmbr2
            }

            function diff(){
                nmbr1 = parseInt(document.getElementById("num1").value);
                nmbr2 = parseInt(document.getElementById("num2").value);
                document.getElementById("result").innerHTML = nmbr1-nmbr2
            }
            function mul(){
                nmbr1 = parseInt(document.getElementById("num1").value);
                nmbr2 = parseInt(document.getElementById("num2").value);
                document.getElementById("result").innerHTML = nmbr1*nmbr2
            }
            function div(){
                nmbr1 = parseInt(document.getElementById("num1").value);
                nmbr2 = parseInt(document.getElementById("num2").value);
                document.getElementById("result").innerHTML = nmbr1/nmbr2
            }
        </script>
    </body>
</html>
